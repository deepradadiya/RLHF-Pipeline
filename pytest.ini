[pytest]
# Pytest configuration file for RLHF Phi-3 Pipeline
# This file provides additional configuration beyond pyproject.toml

# Test discovery
minversion = 7.0
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test execution options
addopts = 
    -ra
    -q
    --strict-markers
    --strict-config
    --tb=short
    --maxfail=5
    --durations=10
    --cov=rlhf_phi3
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=90

# Test markers for categorization
markers =
    unit: Unit tests for individual components
    property: Property-based tests using Hypothesis
    integration: Integration tests for component interactions
    slow: Tests that require significant compute time or resources
    gpu: Tests that require GPU access
    colab: Tests specific to Google Colab environment
    network: Tests that require network access
    auth: Tests that require authentication (Google Drive, HuggingFace, etc.)
    
# Warnings configuration
filterwarnings =
    error
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*CUDA.*:UserWarning
    ignore:.*torch.*:UserWarning
    ignore:.*transformers.*:UserWarning

# Logging configuration for tests
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout configuration (in seconds)
timeout = 300
timeout_method = thread

# Parallel execution (when pytest-xdist is available)
# addopts = -n auto

# Property-based testing configuration
# These settings work with Hypothesis
hypothesis-seed = 42
hypothesis-verbosity = normal