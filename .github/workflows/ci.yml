name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: "3.9"
  HYPOTHESIS_PROFILE: "ci"

jobs:
  lint:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-lint-
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run black (code formatting check)
      run: black --check --diff rlhf_phi3/ tests/
    
    - name: Run isort (import sorting check)
      run: isort --check-only --diff rlhf_phi3/ tests/
    
    - name: Run flake8 (linting)
      run: flake8 rlhf_phi3/ tests/
    
    - name: Run mypy (type checking)
      run: mypy rlhf_phi3/
      continue-on-error: true  # Type checking is advisory for now

  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11"]
        exclude:
          # Reduce matrix size for faster CI
          - os: windows-latest
            python-version: "3.8"
          - os: macos-latest
            python-version: "3.8"
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run unit tests
      run: pytest tests/unit/ -v -m "unit" --cov=rlhf_phi3 --cov-report=xml
    
    - name: Run property-based tests
      run: pytest tests/property/ -v -m "property" --tb=short
    
    - name: Run integration tests (fast)
      run: pytest tests/integration/ -v -m "integration and not slow and not gpu" --tb=short
    
    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.9'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  test-gpu:
    name: GPU Tests
    runs-on: ubuntu-latest
    # Only run on main branch and PRs to main to save GPU resources
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        # Install CPU-only PyTorch for CI (GPU tests will be mocked)
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
    
    - name: Run GPU tests (mocked)
      run: pytest tests/ -v -m "gpu" --tb=short
      env:
        CUDA_VISIBLE_DEVICES: ""  # Force CPU mode

  test-slow:
    name: Slow Integration Tests
    runs-on: ubuntu-latest
    # Only run on scheduled builds and main branch
    if: github.event_name == 'schedule' || github.ref == 'refs/heads/main'
    timeout-minutes: 60
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run slow integration tests
      run: pytest tests/integration/ -v -m "slow" --tb=short --timeout=300
      env:
        HYPOTHESIS_PROFILE: "thorough"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit
    
    - name: Run safety check (dependency vulnerabilities)
      run: safety check --json || true
    
    - name: Run bandit (security linting)
      run: bandit -r rlhf_phi3/ -f json || true

  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    
    - name: Run full test suite with coverage
      run: |
        pytest tests/ -v --cov=rlhf_phi3 --cov-report=html --cov-report=xml --cov-report=term-missing --cov-fail-under=90
    
    - name: Upload coverage reports
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: htmlcov/
    
    - name: Comment coverage on PR
      if: github.event_name == 'pull_request'
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ github.token }}

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    
    - name: Build package
      run: python -m build
    
    - name: Check package
      run: twine check dist/*
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dist
        path: dist/

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        pip install sphinx sphinx-rtd-theme
    
    - name: Check docstring coverage
      run: |
        pip install docstr-coverage
        docstr-coverage rlhf_phi3/ --badge=docs/docstring-coverage.svg || true
    
    - name: Validate README
      run: |
        python -c "
        import re
        with open('README.md') as f:
            content = f.read()
        # Check for basic sections
        required_sections = ['Installation', 'Usage', 'Testing']
        for section in required_sections:
            if section not in content:
                print(f'Warning: README missing {section} section')
        "

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [lint, test, coverage, build]
    if: always()
    
    steps:
    - name: Notify on failure
      if: contains(needs.*.result, 'failure')
      run: |
        echo "CI pipeline failed. Check the logs for details."
        # Add notification logic here (Slack, email, etc.)
    
    - name: Notify on success
      if: needs.lint.result == 'success' && needs.test.result == 'success' && needs.coverage.result == 'success' && needs.build.result == 'success'
      run: |
        echo "CI pipeline completed successfully!"
        # Add notification logic here (Slack, email, etc.)