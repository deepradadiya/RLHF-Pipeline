[tox]
# Tox configuration for testing across multiple Python versions
envlist = py38,py39,py310,py311,lint,coverage
isolated_build = true
skip_missing_interpreters = true

[testenv]
# Base test environment configuration
deps = 
    pytest>=7.4.0
    hypothesis>=6.88.0
    pytest-cov>=4.1.0
    pytest-timeout>=2.1.0
    pytest-mock>=3.11.0
    -r{toxinidir}/requirements.txt

commands = 
    pytest {posargs:tests/}

setenv =
    PYTHONPATH = {toxinidir}
    COVERAGE_FILE = {toxworkdir}/.coverage.{envname}

passenv = 
    CI
    GITHUB_*
    WANDB_*
    HF_*
    GOOGLE_*

[testenv:py38]
basepython = python3.8

[testenv:py39]
basepython = python3.9

[testenv:py310]
basepython = python3.10

[testenv:py311]
basepython = python3.11

[testenv:lint]
# Linting environment
deps = 
    black>=23.9.0
    flake8>=6.1.0
    mypy>=1.5.0
    isort>=5.12.0

commands = 
    black --check --diff rlhf_phi3/ tests/
    isort --check-only --diff rlhf_phi3/ tests/
    flake8 rlhf_phi3/ tests/
    mypy rlhf_phi3/

[testenv:format]
# Code formatting environment
deps = 
    black>=23.9.0
    isort>=5.12.0

commands = 
    black rlhf_phi3/ tests/
    isort rlhf_phi3/ tests/

[testenv:coverage]
# Coverage reporting environment
deps = 
    pytest>=7.4.0
    hypothesis>=6.88.0
    pytest-cov>=4.1.0
    coverage[toml]>=7.3.0
    -r{toxinidir}/requirements.txt

commands = 
    coverage erase
    pytest --cov=rlhf_phi3 --cov-report=
    coverage report --show-missing --fail-under=90
    coverage html
    coverage xml

[testenv:unit]
# Unit tests only
commands = 
    pytest tests/unit/ -v -m "unit" {posargs}

[testenv:property]
# Property-based tests only
commands = 
    pytest tests/property/ -v -m "property" {posargs}

[testenv:integration]
# Integration tests only
commands = 
    pytest tests/integration/ -v -m "integration" {posargs}

[testenv:fast]
# Fast tests (excluding slow tests)
commands = 
    pytest -v -m "not slow and not gpu and not network" {posargs}

[testenv:gpu]
# GPU-specific tests
commands = 
    pytest -v -m "gpu" {posargs}

[testenv:colab]
# Colab-specific tests
deps = 
    {[testenv]deps}
    google-colab
    google-auth>=2.17.0

commands = 
    pytest -v -m "colab" {posargs}

[flake8]
# Flake8 configuration
max-line-length = 88
extend-ignore = E203, W503, E501
exclude = 
    .git,
    __pycache__,
    build,
    dist,
    .eggs,
    *.egg-info,
    .venv,
    .tox,
    .pytest_cache

per-file-ignores =
    __init__.py:F401
    tests/*:S101,S106

[coverage:run]
# Coverage configuration
source = rlhf_phi3
omit = 
    */tests/*
    */test_*
    setup.py
    */venv/*
    */.tox/*

[coverage:report]
# Coverage reporting configuration
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

show_missing = true
precision = 2
fail_under = 90

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml